name: Backup PostgreSQL diário

on:
  schedule:
    - cron: '0 3 * * *'  # todo dia às 03:00 UTC (00:00 BRT)
  workflow_dispatch:       # permite rodar manualmente

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Instalar postgresql-client-18
        run: |
          sudo apt-get install -y gnupg curl lsb-release
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-18

      - name: Dump do banco
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          DATE=$(date +%Y-%m-%d)
          /usr/lib/postgresql/18/bin/pg_dump "$DATABASE_URL" --no-password -Fc -f "backup-$DATE.dump"
          echo "Backup gerado: backup-$DATE.dump ($(du -sh backup-$DATE.dump | cut -f1))"

      - name: Salvar backup como artifact
        uses: actions/upload-artifact@v4
        with:
          name: postgres-backup-${{ github.run_id }}
          path: backup-*.dump
          retention-days: 30
