# railway.toml — configuração do serviço BACKEND no Railway
# O frontend é implantado como um segundo serviço apontando para /frontend

[build]
builder = "dockerfile"
dockerfilePath = "backend/Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
